ai_usage_summary: |
  Claude was used as an engineering co-pilot for architectural discussion,
  scoring formula design, feature engineering decisions, and code review.
  All core algorithms (feature extraction, scoring, honeypot detection,
  reasoning generation, XGBoost LTR training) were engineered and iterated
  by hand with Claude as a sounding board. No LLM is used at runtime —
  the pipeline is fully deterministic.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase hybrid retrieval + learning-to-rank pipeline with multiplicative
  scoring architecture. GPU precompute phase embeds 100K candidates with
  BAAI/bge-large-en-v1.5, computes BM25 sparse scores, re-ranks top-1000
  with cross-encoder/ms-marco-MiniLM-L-6-v2, and extracts 76 structured
  features per candidate across 8 categories: title relevance, career depth
  in AI/retrieval, education quality, ML certifications, career trajectory/
  stability, skill-career coherence (detecting keyword stuffers), behavioral
  signals, and 8 honeypot indicators. CPU ranking phase uses multiplicative
  scoring: score = relevance_gate x technical_core x fit_multiplier x
  behavioral x availability. XGBoost LTR (rank:pairwise, 78 features) trained
  on pseudo-relevance labels (0-4 graded), Optuna-tuned (50 trials), blended
  60/40 with heuristic scores for discrimination. 8-rule honeypot detection
  catches ~19% of dataset (inverted salaries, impossible timelines, expert-
  zero-usage, assessment gaps, template summaries, ghost profiles). Reasoning
  is feature-grounded with 5 lead rotation variants and JD phrase rotation —
  zero hallucination risk. Runtime: ~15 min GPU precompute, <3 min CPU ranking.

scoring_formula: |
  score = relevance_gate x technical_core x fit_multiplier x behavioral x availability
  relevance_gate = 0.35*title + 0.45*career_depth + 0.20*coherence (gate at 0.08)
  technical_core = 0.35*retrieval_depth + 0.25*production_depth + 0.15*vector_db + 0.10*shipped + 0.15*semantic_sim
  fit_multiplier = max(0.3, 0.50*experience_fit + 0.50*skills_fit)
  behavioral = clamp(0.7, 1.2, behavioral_score)
  availability = notice_factor x location_factor

evaluation_metric: "0.50*NDCG@10 + 0.30*NDCG@50 + 0.15*MAP + 0.05*P@10"

feature_count: 76
ltr_feature_count: 78
honeypot_rules: 8
test_count: 42

