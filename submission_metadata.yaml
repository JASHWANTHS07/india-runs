# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude (Anthropic) — architecture design, code review, scoring formula iteration"

ai_usage_summary: |
  Claude was used as an engineering co-pilot for architectural discussion,
  scoring formula design, feature engineering decisions, and code review.
  All core algorithms (feature extraction, scoring, honeypot detection,
  reasoning generation, XGBoost LTR training) were engineered and iterated
  by hand with Claude as a sounding board. No LLM is used at runtime —
  the pipeline is fully deterministic.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid retrieval + learning-to-rank pipeline. GPU precompute phase embeds
  100K candidates with BAAI/bge-large-en-v1.5 (bi-encoder), computes BM25
  sparse scores, and re-ranks top-1000 with cross-encoder/ms-marco-MiniLM-L-6-v2.
  45+ structured features are extracted per candidate: title relevance tiers,
  career depth in AI/retrieval, skill-career coherence (detecting keyword
  stuffers), behavioral signals, and honeypot indicators. CPU ranking phase
  trains XGBoost (rank:pairwise) on pseudo-relevance labels derived from
  high-confidence composite signals, using all features + retrieval scores
  as input. This learns feature interactions that hand-tuned weights miss.
  Honeypots are zero-scored post-LTR. Reasoning is template-generated from
  extracted features — zero hallucination risk, every claim traceable to data.
  Runtime: ~20 min GPU precompute, <3 min CPU ranking.

